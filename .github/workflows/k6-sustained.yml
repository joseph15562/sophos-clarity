# Optional load check against a staging URL. Set repo variable K6_BASE_URL (e.g. https://preview.example/)
# to enable; otherwise this workflow is a no-op.
name: k6 sustained (optional)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/k6/**"
      - ".github/workflows/k6-sustained.yml"

jobs:
  k6:
    if: vars.K6_BASE_URL != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: grafana/setup-k6-action@ffe7d7290dfa715e48c2ccc924d068444c94bde2 # v1

      - name: Run sustained scenario
        run: BASE_URL="${{ vars.K6_BASE_URL }}" k6 run scripts/k6/sustained.js
