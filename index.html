<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sophos FireComply — Firewall Configuration Assessment</title>
    <meta name="description" content="Transform Sophos firewall configuration exports into security assessment reports, executive summaries, and compliance readiness reports." />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans:wght@400;500;600;700;800;900&family=Zalando+Sans+Expanded:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <meta property="og:title" content="Sophos FireComply" />
    <meta property="og:description" content="Firewall Configuration Assessment & Compliance Reporting" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />

    <script>
      // Prevent FOUC: apply saved theme class before first paint
      (function() {
        var stored = null;
        try { stored = localStorage.getItem('sophos-firecomply-theme'); } catch(e) {}
        var dark = stored === 'dark' ||
          (!stored || stored === 'system') &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
