<!DOCTYPE html>
<html>
<head><title>Sophos Config Viewer</title></head>
<body>
  <!-- Valid Sophos structure with data-section-key and section-content-* but no firewall rules table -->
  <div id="sidebar">
    <div data-section-name="Firewall Rules">
      <input type="checkbox" data-section-key="firewallRules" checked />
    </div>
  </div>
  <div id="section-content-firewall-rules">
    <p>No firewall rules configured.</p>
  </div>
</body>
</html>
