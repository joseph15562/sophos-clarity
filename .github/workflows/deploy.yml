name: CI + Deploy Supabase

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Deno format check
        run: npm run format:check:deno

      - name: Deno tests
        run: npm run test:deno

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run tests (with coverage floors)
        run: npm test -- --coverage

      - name: Build
        env:
          VITE_E2E_AUTH_BYPASS: "1"
          VITE_E2E_PDF_DOWNLOAD: "1"
        run: npm run build

      - name: Bundle size budget
        run: node scripts/assert-bundle-budget.mjs

      - name: Audit production dependencies
        # Fails the job on moderate+ issues in production dependencies (dev deps omitted).
        run: npm audit --omit=dev --audit-level=moderate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: npm run test:e2e

      - name: Upload E2E report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  deploy-functions:
    name: Deploy Edge Functions
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: supabase/setup-cli@df56b21da46c98abb12a9804e4fb1f657773e333 # v2.0.0
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        # config.toml verify_jwt only applies to local `supabase functions serve`.
        # For remote deploys, --no-verify-jwt is required when the function
        # handles its own auth internally (getUser / API-key / public routes).
        # --use-api bundles on Supabase (no local Docker); avoids edge-runtime
        # "No such file or directory (os error 2)" failures on ubuntu-latest.
        run: |
          supabase functions deploy parse-config --no-verify-jwt --use-api
          supabase functions deploy api --no-verify-jwt --use-api
          supabase functions deploy api-agent --no-verify-jwt --use-api
          supabase functions deploy api-public --no-verify-jwt --use-api
          supabase functions deploy portal-data --no-verify-jwt --use-api
          supabase functions deploy send-scheduled-reports --no-verify-jwt --use-api
          supabase functions deploy process-job-outbox --no-verify-jwt --use-api
          supabase functions deploy agent-nudge --no-verify-jwt --use-api
          supabase functions deploy agent-daily-presence --no-verify-jwt --use-api
          supabase functions deploy regulatory-scanner --no-verify-jwt --use-api
          supabase functions deploy sophos-advisories-feed --no-verify-jwt --use-api
          supabase functions deploy sophos-central --no-verify-jwt --use-api
          supabase functions deploy healthz --no-verify-jwt --use-api
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-migrations:
    name: Run Database Migrations
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: supabase/setup-cli@df56b21da46c98abb12a9804e4fb1f657773e333 # v2.0.0
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
