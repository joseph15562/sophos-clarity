name: CI + Deploy Supabase

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: v2.x

      - name: Deno format check
        run: npm run format:check:deno

      - name: Deno tests
        run: npm run test:deno

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run tests (with coverage floors)
        run: npm test -- --coverage

      - name: Build
        env:
          VITE_E2E_AUTH_BYPASS: "1"
        run: npm run build

      - name: Audit production dependencies
        # Fails the job on moderate+ issues in production dependencies (dev deps omitted).
        run: npm audit --omit=dev --audit-level=moderate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: npm run test:e2e

      - name: Upload E2E report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  deploy-functions:
    name: Deploy Edge Functions
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        # config.toml verify_jwt only applies to local `supabase functions serve`.
        # For remote deploys, --no-verify-jwt is required when the function
        # handles its own auth internally (getUser / API-key / public routes).
        # --use-api bundles on Supabase (no local Docker); avoids edge-runtime
        # "No such file or directory (os error 2)" failures on ubuntu-latest.
        run: |
          supabase functions deploy parse-config --no-verify-jwt --use-api
          supabase functions deploy api --no-verify-jwt --use-api
          supabase functions deploy api-agent --no-verify-jwt --use-api
          supabase functions deploy api-public --no-verify-jwt --use-api
          supabase functions deploy portal-data --no-verify-jwt --use-api
          supabase functions deploy send-scheduled-reports --no-verify-jwt --use-api
          supabase functions deploy process-job-outbox --no-verify-jwt --use-api
          supabase functions deploy agent-nudge --no-verify-jwt --use-api
          supabase functions deploy regulatory-scanner --no-verify-jwt --use-api
          supabase functions deploy sophos-central --no-verify-jwt --use-api
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-migrations:
    name: Run Database Migrations
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
