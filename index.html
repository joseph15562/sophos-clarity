<!doctype html>
<html lang="en" suppressHydrationWarning>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sophos FireComply — Firewall Configuration Assessment</title>
    <meta name="description" content="Transform Sophos firewall configuration exports into security assessment reports, executive summaries, and compliance readiness reports." />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Zalando+Sans:wght@400;500;600;700;800;900&family=Zalando+Sans+Expanded:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <meta property="og:title" content="Sophos FireComply" />
    <meta property="og:description" content="Firewall Configuration Assessment & Compliance Reporting" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />

    <script>
      // Prevent FOUC: match next-themes (ThemeProvider storageKey + defaultTheme system)
      (function () {
        var key = "sophos-firecomply-theme";
        var el = document.documentElement;
        try {
          el.classList.remove("light", "dark");
          var stored = localStorage.getItem(key);
          var useDark;
          if (stored === "dark") useDark = true;
          else if (stored === "light") useDark = false;
          else {
            useDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          }
          el.classList.add(useDark ? "dark" : "light");
          el.style.colorScheme = useDark ? "dark" : "light";
        } catch (e) {
          el.classList.add("light");
          el.style.colorScheme = "light";
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
