name: Build FireComply Connector

on:
  push:
    branches: [main]
    paths:
      - "firecomply-connector/src/**"
      - "firecomply-connector/package.json"
    tags:
      - "connector-v*"
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Resolve version
        id: resolve
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/connector-v* ]]; then
            VERSION="${GITHUB_REF_NAME#connector-v}"
            echo "Using tag version: $VERSION"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            cd firecomply-connector
            CURRENT=$(node -p "require('./package.json').version")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEW_PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            echo "Bumping $CURRENT -> $VERSION"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            cd ..
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add firecomply-connector/package.json firecomply-connector/package-lock.json
            if git diff --cached --quiet; then
              echo "No version change needed"
              echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
              echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            else
              git commit -m "chore(connector): auto-bump to v${VERSION} [skip ci]"
              git tag "connector-v${VERSION}"
              git push origin HEAD:main --follow-tags
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
              echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            fi
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            dist_script: dist:win
            artifact_pattern: |
              firecomply-connector/release/*.exe
              firecomply-connector/release/latest.yml
          - os: macos-latest
            dist_script: dist:mac
            artifact_pattern: |
              firecomply-connector/release/*.zip
              firecomply-connector/release/latest-mac.yml
          - os: ubuntu-latest
            dist_script: dist:linux
            artifact_pattern: |
              firecomply-connector/release/*.AppImage
              firecomply-connector/release/latest-linux.yml

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: firecomply-connector/package-lock.json

      - name: Set version
        working-directory: firecomply-connector
        shell: bash
        run: |
          npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        working-directory: firecomply-connector
        run: npm ci

      - name: Build and package
        working-directory: firecomply-connector
        run: npm run ${{ matrix.dist_script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: connector-${{ matrix.os }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: warn

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: "connector-v${{ needs.prepare.outputs.version }}"
          name: "FireComply Connector v${{ needs.prepare.outputs.version }}"
          body: |
            ## FireComply Connector v${{ needs.prepare.outputs.version }}

            **Auto-update:** Existing installations will receive this update automatically.

            Manual download:
            - **Windows**: `.exe` installer
            - **macOS**: `.zip` archive
            - **Linux**: `.AppImage` portable binary
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
