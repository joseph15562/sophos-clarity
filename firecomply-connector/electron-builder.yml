appId: com.firecomply.connector
productName: FireComply Connector
publish: null
directories:
  output: release
  buildResources: assets
files:
  - dist/**/*
  - package.json
win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: "FireComply-Connector-Setup.${ext}"
mac:
  target:
    - target: zip
      arch: [universal]
  icon: assets/icon.png
  category: public.app-category.utilities
  artifactName: "FireComply-Connector-mac.${ext}"
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: assets/icon.png
  category: Utility
  artifactName: "FireComply-Connector.${ext}"
