# NOTE: verify_jwt in this file only applies to local development
# (`supabase functions serve`). For remote deploys, use --no-verify-jwt
# in the deploy command (see .github/workflows/deploy.yml).

[functions.parse-config]
verify_jwt = false
# Auth validated internally via getUser().

[functions.api]
verify_jwt = false
# Per-route auth enforced in handler (JWT, API keys, service role).

[functions.api-agent]
verify_jwt = false
# Agent connector auth via X-API-Key header (not JWT).

[functions.api-public]
verify_jwt = false
# Public routes: shared reports, passkey login, guest config upload.

[functions.portal-data]
verify_jwt = false
# Public portal endpoint — no user JWT, resolves by slug/org_id.

[functions.send-scheduled-reports]
verify_jwt = false
# Mixed: cron (no JWT) + manual preview (JWT validated internally).

[functions.process-job-outbox]
verify_jwt = false
# Cron: claims job_outbox rows; authorize with CRON_SECRET Bearer when set.

[functions.agent-nudge]
verify_jwt = false
# Cron-triggered: nudges stale agents and marks offline after 48 h.

[functions.regulatory-scanner]
verify_jwt = false
# User JWT for optional manual scan; service role Bearer for pg_cron daily ingest.

[functions.sophos-central]
verify_jwt = false
# Auth validated internally via getUser().
