name: Staging Deploy

on:
  push:
    branches: [develop, staging]
  pull_request:
    branches: [develop, staging]

jobs:
  check:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno format check
        run: npm run format:check:deno

      - name: Deno tests
        run: npm run test:deno

      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Run tests (with coverage floors)
        run: npm test -- --coverage
      - name: Build
        env:
          VITE_E2E_AUTH_BYPASS: "1"
        run: npm run build
      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: npm run test:e2e

      - name: Upload E2E report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  deploy-staging:
    name: Deploy to Staging
    needs: check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase staging project
        run: supabase link --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        # config.toml verify_jwt only applies to local `supabase functions serve`.
        # For remote deploys, --no-verify-jwt is required when the function
        # handles its own auth internally (getUser / API-key / public routes).
        run: |
          supabase functions deploy parse-config --no-verify-jwt
          supabase functions deploy api --no-verify-jwt
          supabase functions deploy api-agent --no-verify-jwt
          supabase functions deploy api-public --no-verify-jwt
          supabase functions deploy portal-data --no-verify-jwt
          supabase functions deploy send-scheduled-reports --no-verify-jwt
          supabase functions deploy agent-nudge --no-verify-jwt
          supabase functions deploy regulatory-scanner --no-verify-jwt
          supabase functions deploy sophos-central --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
