name: Auto-version Connector

on:
  push:
    branches: [main]
    paths:
      - "firecomply-connector/src/**"
      - "firecomply-connector/package.json"

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump patch version and tag
        working-directory: firecomply-connector
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "Bumping $CURRENT -> $NEW_VERSION"
          npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Commit, tag, and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add firecomply-connector/package.json firecomply-connector/package-lock.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(connector): auto-bump to v${NEW_VERSION} [skip ci]"
          git tag "connector-v${NEW_VERSION}"
          git push origin HEAD:main --follow-tags
