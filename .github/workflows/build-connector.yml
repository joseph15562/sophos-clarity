name: Build FireComply Connector

on:
  push:
    branches: [main]
    paths:
      - "firecomply-connector/**"
      - ".github/workflows/build-connector.yml"
    tags:
      - "connector-v*"
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        working-directory: firecomply-connector
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "Bumping $CURRENT -> $NEW_VERSION"
          npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=connector-v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add firecomply-connector/package.json firecomply-connector/package-lock.json
          git commit -m "chore(connector): auto-bump to v${{ steps.bump.outputs.new_version }} [skip ci]" || echo "No changes to commit"
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push origin HEAD:main --follow-tags

  build:
    needs: [version]
    if: always() && (needs.version.result == 'success' || startsWith(github.ref, 'refs/tags/'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            dist_script: dist:win
            artifact_pattern: "firecomply-connector/release/*.exe"
          - os: macos-latest
            dist_script: dist:mac
            artifact_pattern: "firecomply-connector/release/*.zip"
          - os: ubuntu-latest
            dist_script: dist:linux
            artifact_pattern: "firecomply-connector/release/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: firecomply-connector/package-lock.json

      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/connector-v')
        working-directory: firecomply-connector
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#connector-v}"
          echo "Setting package.json version to $TAG_VERSION"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        working-directory: firecomply-connector
        run: npm ci

      - name: Build and package
        working-directory: firecomply-connector
        run: npm run ${{ matrix.dist_script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: connector-${{ matrix.os }}
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: warn

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success'
    permissions:
      contents: write

    steps:
      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/connector-v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.version.outputs.new_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "FireComply Connector ${{ steps.tag.outputs.tag }}"
          body: |
            ## FireComply Connector ${{ steps.tag.outputs.tag }}

            Download the installer for your operating system:
            - **Windows**: `.exe` installer
            - **macOS**: `.dmg` disk image
            - **Linux**: `.AppImage` portable binary

            ### Setup
            1. Register an agent in the FireComply web app (Settings > FireComply Connector Agents)
            2. Copy your API key
            3. Run the installer and follow the setup wizard
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
